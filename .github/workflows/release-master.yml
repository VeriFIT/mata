name: Release (master)
permissions: write-all
on:
  pull_request:
    types:
      - closed
    branches:
      - master
jobs:
  warnings:
    if: github.event.pull_request.merged == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: ./.github/workflows/actions/setup
        with:
          os: ${{ matrix.os }}
      - uses: ./.github/workflows/actions/compile
        with:
          build-log-output-file: "warnings-release"
      - name: Print release warnings
        run: cat build_log
      - name: Count number of warnings
        run: |
          number_of_warnings=`cat build_log | grep "warning:" | wc -l`
          echo $number_of_warnings
          if [ $number_of_warnings -gt 0 ]; then
            exit 1
          fi
  run-tests:
    if: github.event.pull_request.merged == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: ./.github/workflows/actions/setup
        with:
          os: ${{ matrix.os }}
      - uses: ./.github/workflows/actions/compile
        with:
          build-log-output-file: "warnings-new"
      - name: Test the library
        run: make test
  release:
    needs: [warnings, run-tests]
    runs-on: ubuntu-latest
    outputs:
      new-tag: ${{ steps.bump.outputs.new-tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: ./.github/workflows/actions/github-actions-git-config
      - uses: ./.github/workflows/actions/bump-version
        id: bump
  sync-devel-with-master:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: ./.github/workflows/actions/github-actions-git-config
      - name: Merge master into devel
        run: |
          git checkout devel
          git merge master --no-edit
          git push origin devel
  deploy-docs:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: ./.github/workflows/actions/docs
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/_build/html
  build-and-deploy-to-pypi:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - name: Write the released version to VERSION file
        run: |
          echo "${{ needs.release.outputs.new-tag }}" > VERSION
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install setuptools wheel twine
      - name: Install Python Dependencies
        run: |
          make -C bindings/python init
      - name: Install Unix dependencies
        run: |
          sudo apt -qq update
          sudo apt -qq install -y graphviz graphviz-dev
      - name: Verify that the Binding can be installed
        run: |
          make -C bindings/python install
      - name: Verify tests tests
        run: |
          make -C bindings/python test
      - name: Build python release distribution package
        run: |
          make -C bindings/python pypi-release
      - name: Upload to Pypi
        run: |
          python3 -m twine upload bindings/python/dist/*.tar.gz
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET_TOKEN }}
          # TWINE_REPOSITORY: testpypi
